x-airflow-common: &airflow-common
  image: airflow-env:2.11.0
  env_file:
    - .env
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./config:/opt/airflow/config
    - /var/run/docker.sock:/var/run/docker.sock
  user: "${AIRFLOW_UID}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:

  airflow-builder:
    image: airflow-env:2.11.0
    build:
      context: ./airflow
      dockerfile: Dockerfile
    command: "echo airflow built"

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
    - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
      airflow db migrate &&

      airflow variables set S3_BUCKET \"$S3_BUCKET\" &&
      airflow variables set DAGS_START_DATE \"$DAGS_START_DATE\" &&
      
      airflow connections add minio_s3 \
      --conn-type aws \
      --conn-login \"$MINIO_ROOT_USER\" \
      --conn-password \"$MINIO_ROOT_PASSWORD\" \
      --conn-extra '{\"endpoint_url\":\"'$S3_ENDPOINT_URL'\",\"region_name\":\"'$AWS_DEFAULT_REGION'\"}' &&
      
      airflow users create \
      --username ${AIRFLOW_ADMIN_USERNAME} \
      --password ${AIRFLOW_ADMIN_PASSWORD} \
      --firstname ${AIRFLOW_ADMIN_FIRSTNAME} \
      --lastname ${AIRFLOW_ADMIN_LASTNAME} \
      --role Admin \
      --email ${AIRFLOW_ADMIN_EMAIL}

      "
    restart: "no"
  
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: always
  
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy

    entrypoint: >
      /bin/sh -c "
       
      mc alias set local ${S3_ENDPOINT_URL} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&

      mc mb --ignore-existing local/${S3_BUCKET}  
      "

  kafka:
    image: apache/kafka:4.3.0
    container_name: kafka

    ports:
      - "9092:9092"
      - "9094:9094"

    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: >
        PLAINTEXT://:9092,
        EXTERNAL://:9094,
        CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://kafka:9092,
        EXTERNAL://localhost:9094

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        PLAINTEXT:PLAINTEXT,
        EXTERNAL:PLAINTEXT,
        CONTROLLER:PLAINTEXT
      
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      CLUSTER_ID: ${KAFKA_CLUSTER_ID}

    restart: always

  kafka-init:
    image: apache/kafka:4.3.0
    container_name: kafka-init

    depends_on:
      - kafka

    entrypoint: >
      /bin/bash -c "
      /opt/kafka/bin/kafka-topics.sh \
      --bootstrap-server kafka:9092 \
      --create \
      --if-not-exists \
      --topic ${KAFKA_TOPIC_ORDERS} \
      --partitions 1 \
      --replication-factor 1
      "

    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui

    depends_on:
      - kafka

    ports:
      - "${KAFKA_UI_PORT}:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: local

      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

    restart: always

  spark-streaming:
    image: spark-ephemeral:3.5.7
    build:
      context: ./spark
      dockerfile: dockerfile
    container_name: spark
    depends_on:
      kafka:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ./spark/spark_jobs:/opt/spark_jobs
    command: >
      spark-submit /opt/spark_jobs/kafka_to_s3.py
    restart: always
    ports:
      - "4040:4040"

  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile

    container_name: producer

    depends_on:
      kafka:
        condition: service_started

    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  clickhouse_data:
  clickhouse_logs: